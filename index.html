<script>

 '台南縣':'台南市','台南市':'台南市',

};

// 舊圖資中的縣轄市升格／改制名稱，統一轉成現行名稱。
const townAlias={
 '彰化縣員林鎮':'員林市',
 '苗栗縣頭份鎮':'頭份市',
 '新竹縣竹北鄉':'竹北市',

 '雲林縣斗六鎮':'斗六市',

};
const nonAdministrativeTownNames=new Set(['地圖區','海域','海面','台灣海域','中華民國領海']);
function cleanName(s){
 return String(s||'')
  .normalize('NFKC')
  .replace(/臺/g,'台')
  .replace(/[\s　]/g,'')
  .replace(/\[[^\]]*\]/g,'')
  .replace(/\([^)]*\)/g,'')
  .replace(/（[^）]*）/g,'')
  .trim()
}
function canonicalCounty(s){const c=cleanName(s);return countyAlias[c]||c}
function canonicalTown(county,town){
 let t=cleanName(town);
 if(!t)return t;
 const direct=townAlias[cleanName(county+t)];
 if(direct)return direct;
 if(upgradedMunicipalities.has(county)&&/[市鎮鄉]$/.test(t))t=t.slice(0,-1)+'區';
 return townAlias[cleanName(county+t)]||t
}
function isAdministrativeFeature(f){
 const n=featureNames(f);
 return Boolean(n.county&&n.town&&!nonAdministrativeTownNames.has(n.town));
}
function featureNames(f){
 const p=f.properties||{};
 let rawCounty=cleanName(propName(p,['COUNTYNAME','COUNTY_NAM','county','COUNTY','縣市','C_Name','COUNTYNAME_']));
 let rawTown=cleanName(propName(p,['TOWNNAME','TOWN_NAM','town','TOWN','鄉鎮市區','T_Name','TOWNNAME_']));
 let full=cleanName(propName(p,['name','NAME','Name','行政區名','FULLNAME']));
 if(!rawCounty&&full){
   const oldAndNew=[...Object.keys(countyAlias),...countyNames].sort((a,b)=>b.length-a.length);
   const hit=oldAndNew.find(x=>full.startsWith(x));
   if(hit){rawCounty=hit;rawTown=rawTown||full.slice(hit.length)}
 }
 let county=canonicalCounty(rawCounty);
 if(!rawTown&&full){
   const rawPrefix=rawCounty&&full.startsWith(rawCounty)?rawCounty:(county&&full.startsWith(county)?county:'');
   rawTown=rawPrefix?full.slice(rawPrefix.length):full
 }
 let town=canonicalTown(county,rawTown);
 // 烏坵在不同圖資可能寫成烏坵、烏坵鄉、莆田縣烏坵，甚至只藏在其他屬性欄位。
 // 只要該 feature 明確包含「烏坵」，人口配對一律使用金門縣代管鍵。
 const featureText=cleanName(Object.values(p).join('')+full+rawCounty+rawTown);
 if(featureText.includes('烏坵')||town==='烏坵'||town==='烏坵鄉'){
   county='金門縣';
   town='烏坵鄉';
 }
 // 部分圖資的 name 欄只有「縣市＋鄉鎮」；統一轉成現行名稱後再建立唯一鍵。
 const currentFull=cleanName(county+town);
 return {county,town,full:currentFull||cleanName(full)}

function ringAreaCentroid(ring){
 let twiceArea=0,cx=0,cy=0;
 for(let i=0;i<ring.length-1;i++){const x1=ring[i][0],y1=ring[i][1],x2=ring[i+1][0],y2=ring[i+1][1],cross=x1*y2-x2*y1;twiceArea+=cross;cx+=(x1+x2)*cross;cy+=(y1+y2)*cross}
 if(Math.abs(twiceArea)<1e-12)return null;
 return {area:twiceArea/2,lng:cx/(3*twiceArea),lat:cy/(3*twiceArea)}
}
function pointInRing(lng,lat,ring){
 let inside=false;
 for(let i=0,j=ring.length-1;i<ring.length;j=i++){const xi=ring[i][0],yi=ring[i][1],xj=ring[j][0],yj=ring[j][1];const hit=((yi>lat)!=(yj>lat))&&(lng<(xj-xi)*(lat-yi)/(yj-yi+1e-15)+xi);if(hit)inside=!inside}
 return inside
}
function representativePoint(f){
 try{
   const polys=f.geometry.type==='Polygon'?[f.geometry.coordinates]:f.geometry.coordinates;
   let bestRing=null,bestArea=-1,bestCentroid=null;
   polys.forEach(poly=>{const ring=poly&&poly[0];if(!ring)return;const c=ringAreaCentroid(ring);const a=c?Math.abs(c.area):0;if(a>bestArea){bestArea=a;bestRing=ring;bestCentroid=c}});
   if(!bestRing)return null;
   if(bestCentroid&&Number.isFinite(bestCentroid.lat)&&Number.isFinite(bestCentroid.lng)&&pointInRing(bestCentroid.lng,bestCentroid.lat,bestRing))return [bestCentroid.lat,bestCentroid.lng];
   const lng=bestRing.reduce((s,p)=>s+p[0],0)/bestRing.length,lat=bestRing.reduce((s,p)=>s+p[1],0)/bestRing.length;
   if(Number.isFinite(lat)&&Number.isFinite(lng)&&pointInRing(lng,lat,bestRing))return [lat,lng];
   const p=bestRing[Math.floor(bestRing.length/2)];return p&&isValidCoord(p)?[p[1],p[0]]:null
 }catch(e){console.warn('無法計算行政區代表點',f,e);return null}
}
function officeCacheKey(f){return cleanName(countyName(f)+labelName(f))}
function routingPointForFeature(f){
 const key=officeCacheKey(f);
 const office=Object.prototype.hasOwnProperty.call(officePointCache,key)?officePointCache[key]:null;
 return office||representativePoint(f)
}
function leafTextMap(el){
 const out=[];
 for(const child of [...el.children]){
   if(child.children.length===0){
     const tag=cleanName(child.tagName||'').toLowerCase();
     const value=cleanName(child.textContent||'');
     if(value)out.push({tag,value})
   }
 }
 for(const a of [...(el.attributes||[])]){
   const tag=cleanName(a.name||'').toLowerCase();
   const value=cleanName(a.value||'');
   if(value)out.push({tag,value})
 }
 return out
}
function parsePostalAdminCoordinates(xmlText){
 const doc=new DOMParser().parseFromString(xmlText,'application/xml');
 if(doc.querySelector('parsererror'))throw new Error('中華郵政 XML 格式無法解析');
 const found={};
 const records=[...doc.querySelectorAll('*')].filter(el=>el.children.length>0&&[...el.children].every(c=>c.children.length===0));
 for(const el of records){
   const items=leafTextMap(el);if(!items.length)continue;
   const values=items.map(x=>x.value);
   let county='',town='';
   for(const v0 of values){
     const v=cleanName(v0);
     const cc=canonicalCounty(v);
     if(countyNames.includes(cc)){county=cc;continue}
     const prefix=[...Object.keys(countyAlias),...countyNames].sort((a,b)=>b.length-a.length).find(x=>v.startsWith(x));
     if(prefix){county=canonicalCounty(prefix);const remain=v.slice(prefix.length);if(/[區鄉鎮市]$/.test(remain))town=canonicalTown(county,remain)}
   }
   if(!town){
     const tv=values.map(cleanName).find(v=>/[區鄉鎮市]$/.test(v)&&!countyNames.includes(canonicalCounty(v)));
     if(tv)town=canonicalTown(county,tv)
   }
   if(!county||!town)continue;
   let lat=NaN,lng=NaN;
   for(const {tag,value} of items){
     const n=Number(String(value).replace(/,/g,''));if(!Number.isFinite(n))continue;
     if((tag.includes('lat')||tag.includes('緯')||tag==='y')&&n>=20&&n<=27)lat=n;
     if((tag.includes('lng')||tag.includes('lon')||tag.includes('long')||tag.includes('經')||tag==='x')&&n>=117&&n<=123.8)lng=n
   }
   if(!Number.isFinite(lat)||!Number.isFinite(lng)){
     const nums=values.map(v=>Number(String(v).replace(/,/g,''))).filter(Number.isFinite);
     if(!Number.isFinite(lat))lat=nums.find(n=>n>=20&&n<=27);
     if(!Number.isFinite(lng))lng=nums.find(n=>n>=117&&n<=123.8)
   }
   if(Number.isFinite(lat)&&Number.isFinite(lng))found[cleanName(county+town)]=[lat,lng]
 }
 // 烏坵在部分舊資料中可能歸為莆田縣；統一使用金門縣代管鍵。
 for(const [k,v] of Object.entries({...found}))if(k.includes('烏坵'))found['金門縣烏坵鄉']=v;
 return found
}
async function loadPostalAdminCoordinates(){
 const cacheKey='postAdminCoordinates:1050812';
 try{
   const saved=localStorage.getItem(cacheKey);
   if(saved){
     const parsed=JSON.parse(saved);
     if(parsed&&typeof parsed==='object'&&Object.keys(parsed).length>300){officePointCache=parsed;return Object.keys(parsed).length}
   }
 }catch(e){}
 try{
   const ctl=new AbortController(),timer=setTimeout(()=>ctl.abort(),18000);
   const response=await fetch(POST_COORD_XML_URL,{signal:ctl.signal,cache:'force-cache'});
   clearTimeout(timer);
   if(!response.ok)throw new Error('HTTP '+response.status);
   const xmlText=await response.text();
   const parsed=parsePostalAdminCoordinates(xmlText);
   const count=Object.keys(parsed).length;
   if(count<300)throw new Error('解析到的行政區座標不足：'+count);
   officePointCache=parsed;
   try{localStorage.setItem(cacheKey,JSON.stringify(parsed))}catch(e){}
   return count
 }catch(e){
   console.warn('中華郵政行政區經緯度載入失敗，改用行政區代表點',e);
   officePointCache={};
   return 0
 }
}
function hav(a,b,c,d){const R=6371,rad=Math.PI/180;const x=(c-a)*rad,y=(d-b)*rad;const q=Math.sin(x/2)**2+Math.cos(a*rad)*Math.cos(c*rad)*Math.sin(y/2)**2;return 2*R*Math.asin(Math.sqrt(q))}
function isMainIsland(c){return c&&c[1]>120.0&&c[1]<122.1&&c[0]>21.75&&c[0]<25.45}
// 這些行政區與台灣本島之間沒有連續公路，不能用 driving 路線跨海計算。
const noRoadTownKeys=new Set(['台東縣綠島鄉','台東縣蘭嶼鄉','屏東縣琉球鄉','金門縣烏坵鄉']);
const noRoadCounties=new Set(['澎湖縣','金門縣','連江縣']);
function isNoRoadFeature(f){
 const n=featureNames(f),key=cleanName(n.county+n.town);
 return noRoadTownKeys.has(key)||noRoadCounties.has(n.county)
}
function isRoadConnectedFeature(f,c){return Boolean(c&&isMainIsland(c)&&!isNoRoadFeature(f))}
function candidateHospitals(lat,lng,limit=null){
 const ranked=hospitals.map((h,idx)=>({idx,km:hav(lat,lng,h[1],h[2])})).sort((a,b)=>a.km-b.km);
 return limit==null?ranked:ranked.slice(0,limit)
}
function fallbackForTown(lat,lng){
 const ranked=candidateHospitals(lat,lng);if(!ranked.length)return null;
 const estimates=ranked.map(x=>({idx:x.idx,minutes:Math.round((x.km*1.34/52)*60+7)}));
 const best=estimates[0];
 const within=estimates.filter(x=>x.minutes<=ACCESS_MINUTES).map(x=>x.idx);
 return {minutes:best.minutes,hospitalIndex:best.idx,within}
}
function seedFallbackTimes(){townFeatures.forEach((f,i)=>{const c=routingPointForFeature(f);if(isRoadConnectedFeature(f,c)){const r=fallbackForTown(c[0],c[1]);travel[i]=r?r.minutes:null;bestHospital[i]=r?r.hospitalIndex:null;accessibleHospitals[i]=r?r.within:[];travelSource[i]=Object.prototype.hasOwnProperty.call(officePointCache,officeCacheKey(f))&&officePointCache[officeCacheKey(f)]?'中華郵政行政區座標估算':'行政區代表點估算'}else{travel[i]=null;bestHospital[i]=null;accessibleHospitals[i]=[];travelSource[i]='無陸路'}})}
async function loadPopulation(){
 try{
  const url='https://zh.wikipedia.org/w/api.php?action=parse&page='+encodeURIComponent('中華民國臺灣地區鄉鎮市區列表')+'&prop=text&format=json&origin=*';
  const j=await fetchJsonWithTimeout(url,12000);
  const doc=new DOMParser().parseFromString(j.parse.text['*'],'text/html');
  const tables=[...doc.querySelectorAll('table.wikitable')];
  const table=tables.find(t=>{const h=cleanName(t.querySelector('tr')?.textContent||'');return h.includes('鄉鎮市區')&&h.includes('人口數')&&h.includes('區域代碼')});
  if(!table)throw new Error('找不到鄉鎮人口表');
  let currentCounty='',total=0,count=0;const seen=new Set();
  table.querySelectorAll('tbody tr').forEach(tr=>{
   const cells=[...tr.querySelectorAll(':scope > th, :scope > td')].map(x=>cleanName(x.textContent));
   if(!cells.length)return;
   const town=cells[0];if(!/[市區鄉鎮]$/.test(town)||town.includes('名稱'))return;
   const countyCell=cells.find(v=>countyNames.includes(canonicalCounty(v)));if(countyCell)currentCounty=canonicalCounty(countyCell);
   const codeIndex=cells.findIndex(v=>/^\d{8}$/.test(v));if(codeIndex<0||!cells[codeIndex+2])return;
   const raw=cells[codeIndex+2].replace(/,/g,'');const pop=/^\d+$/.test(raw)?Number(raw):NaN;
   if(!Number.isFinite(pop)||pop<100||pop>1000000)return;
   const currentTown=canonicalTown(currentCounty,town);
   const combined=cleanName(currentCounty+currentTown);if(!combined)return;
   population[combined]=pop;
   const row={county:currentCounty,town:currentTown,key:combined,population:pop};
   const tk=cleanName(currentTown);(populationTownOnly[tk]||(populationTownOnly[tk]=[])).push(row);
   if(!seen.has(combined)){seen.add(combined);populationRows.push(row);total+=pop;count++}
  });
  populationRowsTotal=total;populationRowCount=count;
  if(total<20000000||count<350)throw new Error(`人口資料不完整：${count} 區、${total} 人`);
 }catch(e){console.warn('人口資料載入失敗',e);throw e}
}
function adjustedRoadMinutes(seconds){
 const raw=seconds/60;
 if(raw<=20)return Math.round(raw*1.14+2);
 if(raw<=60)return Math.round(raw*1.10+4);
 return Math.round(raw*1.06+7)
}
async function routeTimesToAllHospitals(){
 const status=document.getElementById('status');
 status.textContent='正在計算各鄉鎮至所有院所的 30 分鐘可及性…';
 const mainland=townFeatures.map((f,i)=>({f,i,c:routingPointForFeature(f)})).filter(x=>isRoadConnectedFeature(x.f,x.c));
 // 公開 OSRM table 服務通常限制單次座標數，因此以 12 個鄉鎮 + 完整院所名單分批計算。
 const batchSize=12;
 const hospitalIds=hospitals.map((_,i)=>i);
 for(let s=0;s<mainland.length;s+=batchSize){
   const group=mainland.slice(s,s+batchSize);
   const coords=[...group.map(x=>[x.c[1],x.c[0]]),...hospitals.map(h=>[h[2],h[1]])];
   const sources=group.map((_,i)=>i).join(';');
   const destinations=hospitalIds.map((_,i)=>group.length+i).join(';');
   const url='https://router.project-osrm.org/table/v1/driving/'+coords.map(x=>x.join(',')).join(';')+'?sources='+sources+'&destinations='+destinations+'&annotations=duration';
   try{
     const j=await fetchJsonWithTimeout(url,22000);
     if(!j.durations||j.durations.length!==group.length)throw new Error('道路矩陣格式錯誤');
     group.forEach((x,row)=>{
       let minSec=Infinity,minHospital=null;
       const within=[];
       hospitalIds.forEach((hid,col)=>{
         const sec=j.durations[row]&&j.durations[row][col];
         if(Number.isFinite(sec)){
           const mins=adjustedRoadMinutes(sec);
           if(sec<minSec){minSec=sec;minHospital=hid}
           if(mins<=ACCESS_MINUTES)within.push(hid);
         }
       });
       accessibleHospitals[x.i]=within;
       if(Number.isFinite(minSec)&&minHospital!=null){travel[x.i]=adjustedRoadMinutes(minSec);bestHospital[x.i]=minHospital;travelSource[x.i]='道路估算'}
     })
   }catch(e){console.warn('道路矩陣批次失敗，保留距離估算',e)}
   status.textContent=`已完成 ${Math.min(s+batchSize,mainland.length)} / ${mainland.length} 個鄉鎮`;
   renderTowns()
 }
 renderTowns();status.textContent='點擊鄉鎮可查看人口與 30 分鐘內可及院所。'
}
function featureIndex(f){return Number.isInteger(f.__mapIndex)?f.__mapIndex:townFeatures.indexOf(f)}
function styleTown(f){const i=featureIndex(f),m=travel[i];return {pane:'townPane',color:'#f8fafc',weight:1,opacity:1,fillOpacity:.62,fillColor:m!=null&&m<=ACCESS_MINUTES?'#16a34a':'#dc2626'}}
function renderTowns(){
 if(townLayer)map.removeLayer(townLayer);let green=0,red=0,gpop=0,rpop=0;
 const matchedKeys=new Set(),countedKeys=new Set(),mapMissingNames=[];
 const validFeatures=townFeatures.filter(f=>representativePoint(f));
 townLayer=L.geoJSON(validFeatures,{pane:'townPane',style:styleTown,onEachFeature:(f,l)=>{
   const i=featureIndex(f),m=travel[i],resolved=resolvePopulationForFeature(f),pop=resolved?resolved.population:null,c=routingPointForFeature(f),hid=bestHospital[i],h=Number.isInteger(hid)?hospitals[hid]:null,withinIds=Array.isArray(accessibleHospitals[i])?accessibleHospitals[i]:[];
   if(resolved)matchedKeys.add(resolved.key);else mapMissingNames.push(`${countyName(f)}${labelName(f)}`);
   if(m!=null&&m<=ACCESS_MINUTES){green++;if(resolved&&!countedKeys.has(resolved.key)){gpop+=pop;countedKeys.add(resolved.key)}}
   else{red++;if(resolved&&!countedKeys.has(resolved.key)){rpop+=pop;countedKeys.add(resolved.key)}}
   l.bindTooltip(`${labelName(f)}${pop?'<br>'+fmt(pop)+'人':''}`,{permanent:false,direction:'center',className:'town-label'});
   const noRoad=isNoRoadFeature(f);
   let accessHtml='';
   if(noRoad) accessHtml='離島，無陸路車程';
   else if(m==null) accessHtml='無可用道路資料';
   else if(withinIds.length){
     const names=withinIds.slice().sort((a,b)=>hospitals[a][0]===PREFERRED_HOSPITAL?-1:hospitals[b][0]===PREFERRED_HOSPITAL?1:0).map(id=>hospitals[id][0]);
     accessHtml='30 分鐘內可及放腫院所：<br>'+names.join('<br>');
   }else accessHtml='30 分鐘內可及放腫院所：無';
   l.bindPopup(`<b>${countyName(f)} ${labelName(f)}</b><br>人口：${pop?fmt(pop)+' 人':'資料未匹配'}<br>${accessHtml}`);
   l.on('mouseover',()=>l.setStyle({weight:2.2,fillOpacity:.78}));l.on('mouseout',()=>townLayer&&townLayer.resetStyle(l))
 }}).addTo(map);
 document.getElementById('greenN').textContent=green;
 document.getElementById('redN').textContent=red;
 document.getElementById('greenPop').textContent=gpop?fmt(gpop):'—';
 document.getElementById('redPop').textContent=rpop?fmt(rpop):'—';
 const unmatchedResult=updateUnmatchedPopulationList(matchedKeys,mapMissingNames);
 const matchedPop=populationRows.filter(r=>matchedKeys.has(r.key)).reduce((sum,r)=>sum+r.population,0),totalPop=populationRowsTotal||matchedPop,missingPop=unmatchedResult.total;
 document.getElementById('totalPop').textContent=totalPop?fmt(totalPop):'—';
 document.getElementById('matchedPop').textContent=matchedPop?fmt(matchedPop):'—';
 document.getElementById('missingPop').textContent=fmt(missingPop);
 document.getElementById('coverageRate').textContent=totalPop?((gpop/totalPop)*100).toFixed(1)+'%':'—'
}
function ensureWuqiuFeature(){
 const exists=townFeatures.some(f=>{const n=featureNames(f);return n.county==='金門縣'&&n.town==='烏坵鄉'});
 if(exists)return;
 // 部分台灣本島導向的公開圖資完全省略烏坵。以下僅作地圖識別與人口配對用途，
 // 以大坵、小坵兩個簡化多邊形呈現，不用於精密測量。
 const box=(lng,lat,dx,dy)=>[[lng-dx,lat-dy],[lng+dx,lat-dy],[lng+dx,lat+dy],[lng-dx,lat+dy],[lng-dx,lat-dy]];
 townFeatures.push({
   type:'Feature',
   properties:{COUNTYNAME:'金門縣',TOWNNAME:'烏坵鄉',name:'金門縣烏坵鄉',syntheticBoundary:true},
   geometry:{type:'MultiPolygon',coordinates:[[[...box(119.4555,24.9891,0.0042,0.0025)]],[[...box(119.4440,24.9878,0.0033,0.0019)]]]}
 });
}
async function load(){
 addHospitals();
 const populationTask=loadPopulation();
 const topo=await fetchFirst(townUrls);let geo;
 if(topo.type==='Topology'){if(window.topojson){const obj=topo.objects[Object.keys(topo.objects)[0]];geo=topojson.feature(topo,obj)}else throw new Error('TopoJSON 解析元件未載入')}else geo=topo;
 townFeatures=(geo.features||[]).map(sanitizeFeature).filter(Boolean).filter(isAdministrativeFeature);
 ensureWuqiuFeature();
 if(!townFeatures.length)throw new Error('鄉鎮界線內容為空或格式無法辨識');
 townFeatures.forEach((f,i)=>Object.defineProperty(f,'__mapIndex',{value:i,enumerable:false}));
 document.getElementById('status').textContent='正在載入中華郵政行政區經緯度…';
 const postalCoordCount=await loadPostalAdminCoordinates();
 seedFallbackTimes();renderTowns();
 document.getElementById('status').textContent=postalCoordCount?`已載入 ${postalCoordCount} 筆中華郵政行政區座標，正在更新 30 分鐘可及性…`:'中華郵政座標未能載入，已改用行政區代表點計算；正在更新 30 分鐘可及性…';
 populationTask.then(()=>{
   renderTowns();
   const matched=townFeatures.filter(f=>resolvePopulationForFeature(f)).length;
   const missing=townFeatures.filter(f=>!resolvePopulationForFeature(f)).map(f=>`${countyName(f)}${labelName(f)}`).filter(Boolean);
   const officeN=Object.values(officePointCache).filter(v=>Array.isArray(v)&&v.length===2).length;
   document.getElementById('status').textContent=`行政區名稱正規化後已配對 ${matched} 個地圖區域，人口表共 ${populationRowCount} 區、${fmt(populationRowsTotal)} 人；中華郵政座標 ${officeN} 筆，正在更新 30 分鐘可及性…`;
   if(missing.length)console.warn('仍未配對的地圖行政區',missing)
 }).catch(()=>{renderTowns();document.getElementById('status').textContent='人口資料未完整載入，紅綠分區可使用，但人口統計暫不採計。'});
 await routeTimesToAllHospitals()
}
load().catch(e=>{console.error(e);document.getElementById('status').innerHTML='地圖資料載入失敗，請重新整理頁面。<br><small>'+String(e&&e.message?e.message:e)+'</small>'});
</script>
